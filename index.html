<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajohua Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Jajohua Dictionary</h1>
</header>

<div class="search-container">
    <select id="searchMode">
        <option value="contains">Contains</option>
        <option value="startsWith">Starts With</option>
        <option value="endsWith">Ends With</option>
    </select>

    <input type="text" id="searchBar" placeholder="Search..." onkeyup="searchDict()" autofocus>

    <button onclick="toggleFavFilter()" id="favFilterBtn">Show All</button>
    <button onclick="toggleFuzzy()" id="fuzzyBtn">Fuzzy Off</button>
    <button onclick="randomWord()">Random</button>

    <select id="themeSelector" onchange="changeTheme()">
        <option value="light">Light Theme</option>
        <option value="dark">Dark Theme</option>
        <option value="high-contrast">High Contrast</option>
        <option value="pop-neon">Pop Neon</option>
    </select>
</div>

<div id="results"></div>

<script>
let dictionary = [];
let fuzzy = false;
let showOnlyFavorites = false; // Track the state of our new filter
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

// Initial data load
fetch('words.json')
    .then(res => res.json())
    .then(data => {
        dictionary = data;
        render(dictionary);
    })
    .catch(err => console.error("Error loading JSON:", err));

/* ---------------- RENDER FUNCTION ---------------- */
function render(data) {
    const container = document.getElementById('results');
    
    if (!data || data.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px; opacity:0.6;">No words found.</p>';
        return;
    }

    container.innerHTML = data.map(item => {
        const fields = Object.keys(item)
            .filter(k => !['word','translation','partOfSpeech','lessonId','masteryLevel'].includes(k))
            .filter(k => item[k] && item[k].toString().trim() !== "")
            .map(k => `<p><strong>${k.charAt(0).toUpperCase() + k.slice(1)}:</strong> ${item[k]}</p>`)
            .join('');

        const isFav = favorites.includes(item.word);

        return `
        <div class="entry" data-word="${item.word.toLowerCase()}">
            <div class="card" onclick="toggleCard(this)">
                <div class="card-top">
                    <div>
                        <div class="word">${item.word}</div>
                        ${item.partOfSpeech ? `<div class="pos">${item.partOfSpeech}</div>` : ''}
                        <div class="translation">${item.translation || ''}</div>
                    </div>
                    <button class="star ${isFav ? 'active' : ''}"
                        onclick="event.stopPropagation(); toggleFav('${item.word}')">
                        ★
                    </button>
                </div>
                <div class="details">
                    ${fields}
                </div>
            </div>
        </div>
        `;
    }).join('');
}

/* ---------------- INTERACTIVE CARD TOGGLE ---------------- */
function toggleCard(el) {
    el.classList.toggle('open');
}

/* ---------------- DICTIONARY SEARCH ENGINE ---------------- */
function searchDict() {
    const query = document.getElementById('searchBar').value.toLowerCase().trim();
    const mode = document.getElementById('searchMode').value;

    const filtered = dictionary.filter(i => {
        // If "Show Stars" is on, immediately filter out non-favorites
        if (showOnlyFavorites && !favorites.includes(i.word)) {
            return false;
        }

        // If there's no text query, keep the item if it passed the favorites check
        if (query === "") return true;

        const word = (i.word || "").toLowerCase();
        const trans = (i.translation || "").toLowerCase();

        let match = false;
        if (mode === "startsWith") {
            match = word.startsWith(query);
        } else if (mode === "endsWith") {
            match = word.endsWith(query);
        } else {
            match = word.includes(query) || trans.includes(query);
        }

        if (!match && fuzzy && query.length > 1) {
            return levenshtein(word, query) <= 2;
        }

        return match;
    });

    render(filtered);
}

/* ---------------- FAVORITES BUTTON TOGGLE ---------------- */
function toggleFavFilter() {
    showOnlyFavorites = !showOnlyFavorites;
    const btn = document.getElementById("favFilterBtn");
    
    if (showOnlyFavorites) {
        btn.innerText = "★ Stars Only";
        btn.style.borderColor = "var(--accent-color)"; // Highlight button when active
    } else {
        btn.innerText = "Show All";
        btn.style.borderColor = ""; 
    }
    
    searchDict(); // Recalculate results based on the filter change
}

/* ---------------- FUZZY SEARCH TOGGLE ---------------- */
function toggleFuzzy() {
    fuzzy = !fuzzy;
    document.getElementById("fuzzyBtn").innerText = "Fuzzy " + (fuzzy ? "On" : "Off");
    searchDict();
}

/* ---------------- RANDOM PICKER ---------------- */
function randomWord() {
    // Pick from current filtered set if available, otherwise entire dictionary
    const dynamicPool = showOnlyFavorites 
        ? dictionary.filter(i => favorites.includes(i.word)) 
        : dictionary;

    if (dynamicPool.length === 0) return;
    const item = dynamicPool[Math.floor(Math.random() * dynamicPool.length)];
    document.getElementById('searchBar').value = item.word;
    searchDict();
}

/* ---------------- FAVORITES STORAGE ---------------- */
function toggleFav(word) {
    if (favorites.includes(word)) {
        favorites = favorites.filter(w => w !== word);
    } else {
        favorites.push(word);
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    
    searchDict();
}

/* ---------------- LEVENSHTEIN LOGIC ---------------- */
function levenshtein(a, b) {
    const matrix = Array.from({ length: b.length + 1 }, () => Array(a.length + 1).fill(0));
    for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
    for (let j = 0; j <= b.length; j++) matrix[j][0] = j;

    for (let j = 1; j <= b.length; j++) {
        for (let i = 1; i <= a.length; i++) {
            matrix[j][i] = b[j - 1] === a[i - 1]
                ? matrix[j - 1][i - 1]
                : Math.min(
                    matrix[j - 1][i - 1] + 1,
                    matrix[j][i - 1] + 1,
                    matrix[j - 1][i] + 1
                );
        }
    }
    return matrix[b.length][a.length];
}

/* ---------------- DESIGN THEME MANAGEMENT ---------------- */
function changeTheme() {
    const theme = document.getElementById("themeSelector").value;
    document.body.classList.remove("dark", "high-contrast", "pop-neon");
    if (theme !== "light") {
        document.body.classList.add(theme);
    }
    localStorage.setItem("theme", theme);
}

window.onload = () => {
    const saved = localStorage.getItem("theme") || "light";
    document.body.classList.remove("dark", "high-contrast", "pop-neon");
    if (saved !== "light") {
        document.body.classList.add(saved);
    }
    document.getElementById("themeSelector").value = saved;
};
</script>

</body>
</html>
