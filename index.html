<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jajohua Dictionary</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <h1>📖 Jajohua Dictionary</h1>
    <p>Search the official language dictionary.</p>
</header>

<div class="toolbar">

    <select id="searchMode">
        <option value="contains">Contains</option>
        <option value="startsWith">Starts With</option>
        <option value="endsWith">Ends With</option>
    </select>

    <input
        id="searchBar"
        type="text"
        placeholder="Search Jajohua..."
        onkeyup="searchDict()"
        autofocus>

    <select id="themeSelector" onchange="changeTheme()">
        <option value="light">☀ Light</option>
        <option value="dark">🌙 Dark</option>
        <option value="contrast">⚫ High Contrast</option>
        <option value="neon">🌈 Neon</option>
    </select>

</div>

<div id="results"></div>

<script>

let dictionary=[];

fetch("words.json")
.then(r=>r.json())
.then(data=>{
    dictionary=data;
    render(dictionary);
});

function render(data){

const results=document.getElementById("results");

results.innerHTML=data.map(item=>{

const fields=Object.keys(item)
.filter(k=>!["word","translation","partOfSpeech","lessonId","masteryLevel"].includes(k))
.filter(k=>item[k]!="")
.map(k=>`
<div class="field">
<div class="label">${k}</div>
<div>${item[k]}</div>
</div>
`).join("");

return`

<div class="entry">

<details>

<summary>

<div class="word">${item.word}</div>

<div class="translation">${item.translation || ""}</div>

<div class="pos">${item.partOfSpeech || ""}</div>

</summary>

<div class="details">

${fields}

</div>

</details>

</div>

`;

}).join("");

}

function searchDict(){

const query=document.getElementById("searchBar").value.toLowerCase();

const mode=document.getElementById("searchMode").value;

render(dictionary.filter(i=>{

const word=(i.word||"").toLowerCase();

const trans=(i.translation||"").toLowerCase();

if(mode==="startsWith")
return word.startsWith(query);

if(mode==="endsWith")
return word.endsWith(query);

return word.includes(query)||trans.includes(query);

}));

}

function changeTheme(){

const theme=document.getElementById("themeSelector").value;

document.body.className=theme;

localStorage.setItem("theme",theme);

}

window.onload=()=>{

const saved=localStorage.getItem("theme") || "light";

document.body.className=saved;

document.getElementById("themeSelector").value=saved;

};

</script>

</body>
</html>
