<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajohua Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Jajohua Dictionary</h1></header>

    <div class="search-container">
        <select id="searchMode">
            <option value="contains">Contains</option>
            <option value="startsWith">Starts With</option>
            <option value="endsWith">Ends With</option>
        </select>
        <input type="text" id="searchBar" placeholder="Search..." onkeyup="searchDict()" autofocus>
        <select id="themeSelector" onchange="changeTheme()">
            <option value="light">Light Theme</option>
            <option value="dark">Dark Theme</option>
            <option value="high-contrast">High Contrast</option>
            <option value="pop-neon">Pop Neon</option>
        </select>
    </div>

    <div id="results"></div>

    <script>
        let dictionary = [];
        fetch('words.json').then(res => res.json()).then(data => { dictionary = data; render(dictionary); });

        function render(data) {
            const container = document.getElementById('results');
            container.innerHTML = data.map(item => {
                // Filter out unwanted fields and empty strings
                const fields = Object.keys(item)
                    .filter(k => !['word', 'translation', 'partOfSpeech', 'lessonId', 'masteryLevel'].includes(k))
                    .filter(k => item[k] && item[k] !== "")
                    .map(k => `<p><strong>${k}:</strong> ${item[k]}</p>`).join('');

                return `
                    <div class="entry">
                        <details>
                            <summary>
                                <span class="word">${item.word}</span>
                                <span class="pos">${item.partOfSpeech || ''}</span><br>
                                <span>${item.translation || ''}</span>
                            </summary>
                            <div class="details-content">${fields}</div>
                        </details>
                    </div>`;
            }).join('');
        }

        function changeTheme() {
            const theme = document.getElementById('themeSelector').value;
            document.body.className = theme === 'light' ? '' : theme;
            localStorage.setItem('theme', theme);
        }

        window.onload = () => {
            const saved = localStorage.getItem('theme') || 'light';
            document.body.className = saved === 'light' ? '' : saved;
            document.getElementById('themeSelector').value = saved;
        };

        function searchDict() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const mode = document.getElementById('searchMode').value;
            render(dictionary.filter(i => {
                if (mode === "startsWith") return i.word.toLowerCase().startsWith(query);
                if (mode === "endsWith") return i.word.toLowerCase().endsWith(query);
                return i.word.toLowerCase().includes(query) || i.translation.toLowerCase().includes(query);
            }));
        }
    </script>
</body>
</html>
