<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajohua Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Jajohua Dictionary</h1>
    </header>

    <div class="search-container">
        <select id="searchMode">
            <option value="contains">Contains</option>
            <option value="startsWith">Starts With</option>
            <option value="endsWith">Ends With</option>
        </select>
        <input type="text" id="searchBar" placeholder="Search..." onkeyup="searchDict()" autofocus>
        <select id="themeSelector" onchange="changeTheme()">
            <option value="light">Light Theme</option>
            <option value="dark">Dark Theme</option>
        </select>
    </div>

    <div id="results"></div>

    <script>
        let dictionary = [];
        
        fetch('words.json')
            .then(res => res.json())
            .then(data => { dictionary = data; render(dictionary); })
            .catch(err => console.error("Error loading JSON:", err));

        function render(data) {
            document.getElementById('results').innerHTML = data.map(item => {
                const extraFields = Object.keys(item)
                    .filter(key => !['word', 'translation', 'partOfSpeech', 'lessonId', 'masteryLevel'].includes(key))
                    .filter(key => item[key] !== "" && item[key] !== null)
                    .map(key => `<p><strong>${key.charAt(0).toUpperCase() + key.slice(1)}:</strong> ${item[key]}</p>`)
                    .join('');

                return `
                    <div class="entry">
                        <details>
                            <summary>
                                <span class="word">${item.word}</span>
                                <span class="pos">${item.partOfSpeech}</span>
                                <div style="font-weight: normal; margin-top:5px;">${item.translation}</div>
                            </summary>
                            <div class="details-content">${extraFields}</div>
                        </details>
                    </div>
                `;
            }).join('');
        }

        function changeTheme() {
            const theme = document.getElementById('themeSelector').value;
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeSelector').value = 'dark';
            }
        };

        function searchDict() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const mode = document.getElementById('searchMode').value;
            
            render(dictionary.filter(i => {
                const target = i.word.toLowerCase();
                if (mode === "startsWith") return target.startsWith(query);
                if (mode === "endsWith") return target.endsWith(query);
                return target.includes(query);
            }));
        }
    </script>
</body>
</html>
