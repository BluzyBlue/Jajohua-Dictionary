<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jajohua Dictionary</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; line-height: 1.4; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.8em; }
        #searchBar { width: 100%; padding: 10px; font-size: 1.1em; border: 2px solid #333; box-sizing: border-box; margin-bottom: 20px; }
        
        #results { column-width: 280px; column-gap: 15px; }
        .entry { display: inline-block; width: 100%; margin-bottom: 15px; break-inside: avoid; border: 1px solid #ddd; background: #fff; border-radius: 4px; }
        
        summary { padding: 15px; cursor: pointer; list-style: none; font-weight: bold; }
        summary::-webkit-details-marker { display: none; }
        
        .word { font-size: 1.2em; color: #0066cc; }
        .pos { color: #777; font-size: 0.8em; margin-left: 5px; }
        .details-content { padding: 15px; border-top: 1px solid #eee; background: #fafafa; font-size: 0.9em; }
    </style>
</head>
<body>

    <header>
        <h1>Jajohua Dictionary</h1>
    </header>

    <input type="text" id="searchBar" placeholder="Search..." onkeyup="searchDict()" autofocus>
    <div id="results"></div>

    <script>
        let dictionary = [];
        fetch('words.json')
            .then(res => res.json())
            .then(data => { dictionary = data; render(dictionary); });

      function render(data) {
    document.getElementById('results').innerHTML = data.map(item => {
        // 1. Get all keys from the current JSON object
        // 2. Filter out keys we don't want (word, translation, partOfSpeech, and lessonId)
        // 3. Create the HTML for the remaining fields automatically
        const extraFields = Object.keys(item)
            .filter(key => !['word', 'masteryLevel' 'lessonId'].includes(key))
            .map(key => `<p><strong>${key.charAt(0).toUpperCase() + key.slice(1)}:</strong> ${item[key]}</p>`)
            .join('');

        return `
            <div class="entry">
                <details>
                    <summary>
                        <span class="word">${item.word}</span>
                        <span class="pos">${item.partOfSpeech}</span>
                        <div style="font-weight: normal; margin-top:5px;">${item.translation}</div>
                    </summary>
                    <div class="details-content">
                        ${extraFields}
                    </div>
                </details>
            </div>
        `;
    }).join('');
}

        function searchDict() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            render(dictionary.filter(i => i.word.toLowerCase().includes(query) || i.translation.toLowerCase().includes(query)));
        }
    </script>
</body>
</html>
